{% extends 'approval_system/base.html' %}

{% block title %}Upload Document - Cloud Approval System{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <div class="form-header">
            <h2>Submit New Document</h2>
            <p>Fill out the details below to start the approval workflow.</p>
        </div>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">Document Title</label>
                <input type="text" name="title" id="title" placeholder="e.g. Q4 Financial Report" required>
            </div>
            
            <div class="form-row">
                <div class="form-group half">
                    <label for="category">Category</label>
                    <input type="text" name="category" id="category" placeholder="e.g. Finance">
                </div>
                <div class="form-group half">
                    <label for="approver_id">Select Approver</label>
                    <select name="approver_id" id="approver_id" required>
                        <option value="" disabled selected>Choose a manager...</option>
                        {% for approver in approvers %}
                            <option value="{{ approver.id }}">{{ approver.username }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description">Description (Optional)</label>
                <textarea name="description" id="description" rows="3" placeholder="Provide some context for the approver..."></textarea>
            </div>
            
            <div class="form-group document-upload">
                <label for="document_file">Upload File</label>
                <div class="file-input-wrapper">
                    <input type="file" name="document_file" id="document_file" required>
                    <div class="file-hint">PDF, DOCX, or Images accepted</div>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Upload & Submit</button>
                <a href="{% url 'request_dashboard' %}" class="btn btn-link">Cancel</a>
            </div>
        </form>
    </div>
</div>

<style>
    .form-container { display: flex; justify-content: center; padding: 3rem 0; }
    .form-card { background: white; width: 100%; max-width: 600px; padding: 2.5rem; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .form-header { margin-bottom: 2rem; border-bottom: 1px solid #edf2f7; padding-bottom: 1rem; }
    .form-header h2 { margin: 0; color: #2d3748; }
    .form-header p { color: #718096; margin-top: 0.5rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #4a5568; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
    .form-row { display: flex; gap: 1rem; }
    .half { flex: 1; }
    .document-upload { background: #f7fafc; padding: 1.5rem; border-radius: 8px; border: 2px dashed #cbd5e0; }
    .file-hint { font-size: 0.8rem; color: #a0aec0; margin-top: 0.5rem; }
    .form-actions { display: flex; gap: 1rem; align-items: center; margin-top: 2rem; }
    .btn { padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; text-decoration: none; border: none; }
    .btn-primary { background: #4a5568; color: white; flex: 1; }
    .btn-link { color: #718096; }
</style>
{% endblock %}
