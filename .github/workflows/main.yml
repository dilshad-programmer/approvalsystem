name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    name: Code Quality (Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install flake8
      - name: Run Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test:
    name: Django Tests
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -r .github/workflows/requirements-test.txt
      - name: Run Tests
        run: python manage.py test
        env:
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_REGION: us-west-2
          DJANGO_SECRET_KEY: ci-test-key

  deploy-lambda:
    name: Deploy AWS Lambda
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: Zip Lambda function
        run: |
          cd aws_lambda
          zip -j function.zip process_approval.py
      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ProcessDocumentApproval \
            --zip-file fileb://aws_lambda/function.zip

  deploy-ebs:
    name: Deploy AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Set EB Environment Variables
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name Doc-approval-env-env \
            --option-settings \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_ACCESS_KEY_ID,Value=${{ secrets.AWS_ACCESS_KEY_ID }} \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_SECRET_ACCESS_KEY,Value=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_SESSION_TOKEN,Value=${{ secrets.AWS_SESSION_TOKEN }} \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_REGION,Value=us-east-1 \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DJANGO_SETTINGS_MODULE,Value=cloud_approval.settings

      - name: Create deployment package
        run: |
          zip -r app.zip . \
            --exclude "*.git*" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc"

      - name: Upload to existing S3 bucket
        run: |
          aws s3 cp app.zip s3://doc-approval-bucket/eb-deployments/app-v-${{ github.run_id }}.zip

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name doc-approval-app \
            --version-label "v-${{ github.run_id }}" \
            --source-bundle S3Bucket=doc-approval-bucket,S3Key=eb-deployments/app-v-${{ github.run_id }}.zip \
            --description "CI/CD Deployment Run ${{ github.run_id }}"

      - name: Deploy version to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name Doc-approval-env-env \
            --version-label "v-${{ github.run_id }}"

      - name: Wait for deployment to complete
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-names Doc-approval-env-env