name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    name: Code Quality (Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install flake8
      - name: Run Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test:
    name: Django Tests
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -r .github/workflows/requirements-test.txt
      - name: Run Tests
        run: python manage.py test
        env:
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_REGION: us-west-2
          DJANGO_SECRET_KEY: ci-test-key

  deploy-lambda:
    name: Deploy AWS Lambda
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      - name: Zip Lambda function
        run: |
          cd aws_lambda
          zip -j function.zip process_approval.py
      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ProcessDocumentApproval \
            --zip-file fileb://aws_lambda/function.zip

  deploy-ebs:
    name: Deploy AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install EB CLI
        run: |
          python -m pip install --upgrade pip
          pip install awsebcli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Set Environment Variables and Deploy
        env:
          EB_AWS_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          EB_AWS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EB_AWS_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        run: |
          eb init Doc-approval-env --region us-east-1 --platform "Python 3.9"
          eb use Doc-approval-env-env
          
          # Use single quotes to prevent shell expansion of special characters in secrets
          eb setenv AWS_ACCESS_KEY_ID="$EB_AWS_ID" \
                    AWS_SECRET_ACCESS_KEY="$EB_AWS_KEY" \
                    AWS_SESSION_TOKEN="$EB_AWS_TOKEN" \
                    AWS_REGION=us-east-1 \
                    DJANGO_SECRET_KEY="django-insecure-7\$@56q647i*pq2rp4k(8lecf%fgmblm%cdm=6-=lw=np!6ml^y"
          
          eb deploy --timeout 25 --label "v-${{ github.run_id }}" --message "CI/CD Deployment Run ${{ github.run_id }}"